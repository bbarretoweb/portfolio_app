name: portfolio_app
description: A modern Flutter portfolio application showcasing the design_kit component library.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  design_kit:
    path: ../design_kit
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.1
  visibility_detector: ^0.4.0+2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
