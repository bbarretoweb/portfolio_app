name: portfolio_app
description: A modern Flutter portfolio application showcasing the design_kit component library.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  design_kit:
    path: ../design_kit
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  go_router: ^15.1.1
  google_fonts: ^6.2.1
  http: ^1.6.0
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
